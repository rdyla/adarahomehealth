<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Profile Picture Uploader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.4;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
    }
    .muted {
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Zoom Profile Picture Uploader</h1>

  <div class="card">
    <p class="muted">
      Upload a CSV with columns <strong>email,filename</strong>, then upload the matching image files.
    </p>

    <form id="uploadForm">
      <div>
        <label for="csv">CSV file:</label><br />
        <input id="csv" name="csv" type="file" accept=".csv" required />
      </div>

      <br />

      <div>
        <label for="images">Image files:</label><br />
        <input
          id="images"
          name="images"
          type="file"
          accept=".jpg,.jpeg,.png,.gif,image/jpeg,image/png,image/gif"
          multiple
          required
        />
      </div>

      <br />

      <div>
        <label for="workerUrl">Worker base URL:</label><br />
        <input
          id="workerUrl"
          type="url"
          placeholder="https://your-worker.your-subdomain.workers.dev"
          style="width: 100%; padding: 8px;"
          required
        />
      </div>

      <br />
      <button type="submit">Upload to Zoom</button>
    </form>
  </div>

  <div class="card">
    <h2>Result</h2>
    <pre id="output">No upload yet.</pre>
  </div>

  <script>
    const form = document.getElementById("uploadForm");
    const output = document.getElementById("output");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const csv = document.getElementById("csv").files[0];
      const imageFiles = document.getElementById("images").files;
      const workerUrl = document.getElementById("workerUrl").value.replace(/\/$/, "");

      if (!csv) {
        output.textContent = "Please select a CSV file.";
        return;
      }

      if (!imageFiles.length) {
        output.textContent = "Please select one or more image files.";
        return;
      }

      const formData = new FormData();
      formData.append("csv", csv);

      for (const file of imageFiles) {
        formData.append("images", file, file.name);
      }

      output.textContent = "Uploading...";

      try {
        const response = await fetch(`${workerUrl}/api/upload-pictures`, {
          method: "POST",
          body: formData,
        });

        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = JSON.stringify({
          error: "Request failed",
          details: err.message
        }, null, 2);
      }
    });
  </script>
</body>
</html>
